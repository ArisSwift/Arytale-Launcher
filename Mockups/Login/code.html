<style>
        .glass-panel {
            background-color: theme('colors.glass-surface');
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .input-glow:focus {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            border-color: theme('colors.primary-container');
        }
        .btn-pulse {
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }
        
        /* Subtle holographic grid overlay for the void */
        .holographic-grid {
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
        }

        /* Subtle animated scanline */
        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, rgba(0, 242, 255, 0), rgba(0, 242, 255, 0.05) 50%, rgba(0, 242, 255, 0));
            position: absolute;
            top: -100px;
            left: 0;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        /* Simulating the character interaction light */
        .interaction-glow {
            position: absolute;
            right: 35%; /* Adjust based on exact character hand position */
            top: 50%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, rgba(0, 242, 255, 0) 70%);
            border-radius: 50%;
            transform: translate(50%, -50%);
            animation: breathe 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { transform: translate(50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(50%, -50%) scale(1.2); opacity: 1; }
        }
    </style>
